<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - MadWidgets</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calendar">

    <div class="header">
        <button id="prev">&#10094;</button>

        <h2 id="month-year"></h2>

        <button id="next">&#10095;</button>
    </div>

    <div class="weekdays">
        <div>Min</div>
        <div>Sen</div>
        <div>Sel</div>
        <div>Rab</div>
        <div>Kam</div>
        <div>Jum</div>
        <div>Sab</div>
    </div>

    <div class="days" id="days"></div>

</div>

<script src="script.js"></script>

</body>
</html>
