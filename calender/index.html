<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Calendar</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#ffffff;
    font-family:'Poppins',sans-serif;
}

.calendar{

    width:330px;

    background:#F5EDE9;

    border-radius:24px;

    padding:24px;

}

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;

}

#month{

    font-size:20px;

    font-weight:600;

    color:#703B3B;

}

.arrow{

    width:34px;

    height:34px;

    border-radius:50%;

    border:none;

    cursor:pointer;

    background:white;

    color:#703B3B;

    font-size:18px;

    transition:.25s;

}

.arrow:hover{

    background:#703B3B;

    color:white;

}

.weekdays{

    display:grid;

    grid-template-columns:repeat(7,1fr);

    text-align:center;

    margin-bottom:12px;

}

.weekdays div{

    color:#9b7474;

    font-size:13px;

    font-weight:500;

}

.days{

    display:grid;

    grid-template-columns:repeat(7,1fr);

    gap:8px;

}

.day{

    width:34px;

    height:34px;

    display:flex;

    justify-content:center;

    align-items:center;

    margin:auto;

    border-radius:50%;

    color:#703B3B;

    font-size:14px;

    transition:.25s;

}

.day:hover{

    background:white;

}

.today{

    background:#703B3B;

    color:white;

    font-weight:600;

}

</style>
</head>

<body>

<div class="calendar">

<div class="header">

<button class="arrow" id="prev">‹</button>

<div id="month"></div>

<button class="arrow" id="next">›</button>

</div>

<div class="weekdays">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>

<div class="days" id="days"></div>

</div>

<script>

let current=new Date();

function render(){

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

document.getElementById("month").innerHTML=
months[current.getMonth()]+" "+current.getFullYear();

const days=document.getElementById("days");

days.innerHTML="";

const first=new Date(
current.getFullYear(),
current.getMonth(),
1
).getDay();

const total=new Date(
current.getFullYear(),
current.getMonth()+1,
0
).getDate();

for(let i=0;i<first;i++){

days.innerHTML+="<div></div>";

}

const today=new Date();

for(let i=1;i<=total;i++){

const div=document.createElement("div");

div.className="day";

div.textContent=i;

if(

i===today.getDate()&&

current.getMonth()===today.getMonth()&&

current.getFullYear()===today.getFullYear()

){

div.classList.add("today");

}

days.appendChild(div);

}

}

render();

document.getElementById("prev").onclick=()=>{

current.setMonth(current.getMonth()-1);

render();

}

document.getElementById("next").onclick=()=>{

current.setMonth(current.getMonth()+1);

render();

}

</script>

</body>
</html>
