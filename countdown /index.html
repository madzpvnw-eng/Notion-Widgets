<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown Widget</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#F5EDE9;
--text:#703B3B;
--card:#FFFFFF;

}

body{

background:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

font-family:Poppins,sans-serif;

}

.widget{

width:340px;

background:var(--bg);

padding:28px;

border-radius:24px;

box-shadow:0 15px 40px rgba(0,0,0,.08);

text-align:center;

}

.title{

font-size:24px;

font-weight:600;

color:var(--text);

margin-bottom:25px;

}

.numbers{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:12px;

margin-bottom:25px;

}

.box{

background:white;

padding:15px 10px;

border-radius:18px;

}

.value{

font-size:30px;

font-weight:700;

color:var(--text);

}

.label{

font-size:12px;

margin-top:5px;

color:#9b7b7b;

}

.footer{

font-size:14px;

color:#8d6c6c;

}

</style>

</head>

<body>

<div class="widget">

<div class="title" id="title"></div>

<div class="numbers">

<div class="box">

<div class="value" id="days">00</div>

<div class="label">Days</div>

</div>

<div class="box">

<div class="value" id="hours">00</div>

<div class="label">Hours</div>

</div>

<div class="box">

<div class="value" id="minutes">00</div>

<div class="label">Minutes</div>

</div>

<div class="box">

<div class="value" id="seconds">00</div>

<div class="label">Seconds</div>

</div>

</div>

<div class="footer" id="date"></div>

</div>

<script>

/* ===========================
   CONFIG
=========================== */

const config={

title:"🎓 Graduation",

targetDate:"2026-12-31T00:00:00",

background:"#F5EDE9",

text:"#703B3B"

};

/* =========================== */

document.documentElement.style.setProperty("--bg",config.background);

document.documentElement.style.setProperty("--text",config.text);

document.getElementById("title").textContent=config.title;

document.getElementById("date").textContent=
new Date(config.targetDate).toLocaleDateString("en-US",{

day:"numeric",

month:"long",

year:"numeric"

});

function countdown(){

const now=new Date().getTime();

const target=new Date(config.targetDate).getTime();

const distance=target-now;

if(distance<0){

document.querySelector(".widget").innerHTML="<h2 style='color:#703B3B'>🎉 Event Started!</h2>";

return;

}

const days=Math.floor(distance/(1000*60*60*24));

const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

const minutes=Math.floor((distance%(1000*60*60))/(1000*60));

const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("days").textContent=days;

document.getElementById("hours").textContent=String(hours).padStart(2,"0");

document.getElementById("minutes").textContent=String(minutes).padStart(2,"0");

document.getElementById("seconds").textContent=String(seconds).padStart(2,"0");

}

countdown();

setInterval(countdown,1000);

</script>

</body>
</html>
