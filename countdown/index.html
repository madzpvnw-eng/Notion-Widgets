<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Countdown | MadWidgets</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="container">

        <div class="countdown-card">

            <!-- =========================
                 Header
            ========================== -->

            <header class="header">

                <h1>COMING SOON</h1>

            </header>

            <!-- =========================
                 Controls
            ========================== -->

            <section class="controls">

                <div class="field">

                    <label for="eventName">📝 Event Name</label>

                    <input
                        type="text"
                        id="eventName"
                        placeholder="My Birthday">

                </div>

                <div class="field">

                    <label for="targetDate">📅 Target Date</label>

                    <input
                        type="date"
                        id="targetDate">

                </div>

                <div class="field">

                    <label for="targetTime">🕒 Target Time</label>

                    <input
                        type="time"
                        id="targetTime">

                </div>

                <button id="applyBtn">

                    Apply Countdown

                </button>

            </section>

            <!-- =========================
                 Event Title
            ========================== -->

            <h2 id="eventTitle">

                Event Name

            </h2>

            <!-- =========================
                 Countdown
            ========================== -->

            <section class="countdown">

                <!-- Days -->

                <div class="unit">

                    <div class="flip-card" data-unit="days">

                        <div class="top">000</div>

                        <div class="bottom">000</div>

                        <div class="top-flip"></div>

                        <div class="bottom-flip"></div>

                    </div>

                    <span>Days</span>

                </div>

                <!-- Hours -->

                <div class="unit">

                    <div class="flip-card" data-unit="hours">

                        <div class="top">00</div>

                        <div class="bottom">00</div>

                        <div class="top-flip"></div>

                        <div class="bottom-flip"></div>

                    </div>

                    <span>Hours</span>

                </div>

                <!-- Minutes -->

                <div class="unit">

                    <div class="flip-card" data-unit="minutes">

                        <div class="top">00</div>

                        <div class="bottom">00</div>

                        <div class="top-flip"></div>

                        <div class="bottom-flip"></div>

                    </div>

                    <span>Minutes</span>

                </div>

                <!-- Seconds -->

                <div class="unit">

                    <div class="flip-card" data-unit="seconds">

                        <div class="top">00</div>

                        <div class="bottom">00</div>

                        <div class="top-flip"></div>

                        <div class="bottom-flip"></div>

                    </div>

                    <span>Seconds</span>

                </div>

            </section>

            <!-- =========================
                 Footer Message
            ========================== -->

            <p id="message"></p>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
