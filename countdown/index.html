<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Countdown | MadWidgets</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <main class="container">

        <section class="countdown-card">

            <h1 class="title">
                COMING SOON
            </h1>

            <!-- ==========================
                 FORM
            =========================== -->

            <div class="form">

                <div class="input-group">

                    <label for="eventName">
                        📝 Event Name
                    </label>

                    <input
                        type="text"
                        id="eventName"
                        placeholder="My Birthday">

                </div>

                <div class="row">

                    <div class="input-group">

                        <label for="targetDate">
                            📅 Target Date
                        </label>

                        <input
                            type="date"
                            id="targetDate">

                    </div>

                    <div class="input-group">

                        <label for="targetTime">
                            🕒 Target Time
                        </label>

                        <input
                            type="time"
                            id="targetTime">

                    </div>

                </div>

                <button id="applyBtn">

                    Apply Countdown

                </button>

            </div>

            <!-- ==========================
                 EVENT TITLE
            =========================== -->

            <h2
                class="event-title"
                id="eventTitle">

                Event Name

            </h2>

            <!-- ==========================
                 COUNTDOWN
            =========================== -->

            <div class="countdown">

                <!-- Days -->

                <div class="time-box">

                    <div class="flip-card">

                        <span
                            id="days"
                            class="number">

                            000

                        </span>

                    </div>

                    <span class="label">

                        Days

                    </span>

                </div>

                <!-- Hours -->

                <div class="time-box">

                    <div class="flip-card">

                        <span
                            id="hours"
                            class="number">

                            00

                        </span>

                    </div>

                    <span class="label">

                        Hours

                    </span>

                </div>

                <!-- Minutes -->

                <div class="time-box">

                    <div class="flip-card">

                        <span
                            id="minutes"
                            class="number">

                            00

                        </span>

                    </div>

                    <span class="label">

                        Minutes

                    </span>

                </div>

                <!-- Seconds -->

                <div class="time-box">

                    <div class="flip-card">

                        <span
                            id="seconds"
                            class="number">

                            00

                        </span>

                    </div>

                    <span class="label">

                        Seconds

                    </span>

                </div>

            </div>

            <!-- ==========================
                 MESSAGE
            =========================== -->

            <p
                id="message"
                class="message">

            </p>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
