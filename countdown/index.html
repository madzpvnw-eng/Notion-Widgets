<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Countdown | MadWidgets</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="countdown">

        <div class="card">

            <!-- =========================
                 Header
            ========================== -->

            <header>

                <h1>COMING SOON</h1>

            </header>

            <!-- =========================
                 Controls
            ========================== -->

            <section class="controls">

                <div class="field">

                    <label for="eventName">

                        📝 Event Name

                    </label>

                    <input
                        type="text"
                        id="eventName"
                        placeholder="My Birthday">

                </div>

                <div class="field">

                    <label for="targetDate">

                        📅 Target Date

                    </label>

                    <input
                        type="date"
                        id="targetDate">

                </div>

                <div class="field">

                    <label for="targetTime">

                        🕒 Target Time

                    </label>

                    <input
                        type="time"
                        id="targetTime">

                </div>

                <button id="applyBtn">

                    Apply Countdown

                </button>

            </section>

            <!-- =========================
                 Event Name
            ========================== -->

            <h2 id="eventTitle">

                Event Name

            </h2>

            <!-- =========================
                 Countdown
            ========================== -->

            <section class="countdown-box">

                <!-- Days -->

                <div class="unit">

                    <div class="flip-card" id="days-card">

                        <div class="top" id="days-top">

                            000

                        </div>

                        <div class="bottom" id="days-bottom">

                            000

                        </div>

                        <div class="top-flip"></div>

                        <div class="bottom-flip"></div>

                    </div>

                    <span>

                        Days

                    </span>

                </div>

                <!-- Hours -->

                <div class="unit">

                    <div class="flip-card" id="hours-card">

                        <div class="top" id="hours-top">

                            00

                        </div>

                        <div class="bottom" id="hours-bottom">

                            00

                        </div>

                        <div class="top-flip"></div>

                        <div class="bottom-flip"></div>

                    </div>

                    <span>

                        Hours

                    </span>

                </div>

                <!-- Minutes -->

                <div class="unit">

                    <div class="flip-card" id="minutes-card">

                        <div class="top" id="minutes-top">

                            00

                        </div>

                        <div class="bottom" id="minutes-bottom">

                            00

                        </div>

                        <div class="top-flip"></div>

                        <div class="bottom-flip"></div>

                    </div>

                    <span>

                        Minutes

                    </span>

                </div>

                <!-- Seconds -->

                <div class="unit">

                    <div class="flip-card" id="seconds-card">

                        <div class="top" id="seconds-top">

                            00

                        </div>

                        <div class="bottom" id="seconds-bottom">

                            00

                        </div>

                        <div class="top-flip"></div>

                        <div class="bottom-flip"></div>

                    </div>

                    <span>

                        Seconds

                    </span>

                </div>

            </section>

            <!-- =========================
                 Message
            ========================== -->

            <p id="message"></p>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
