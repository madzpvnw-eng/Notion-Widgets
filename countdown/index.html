<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Countdown | MadWidgets</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>COMING SOON</h1>

            <!-- Event Name -->

            <div class="input-group">

                <label>📝 Event Name</label>

                <input
                    type="text"
                    id="eventName"
                    placeholder="My Birthday">

            </div>

            <!-- Date -->

            <div class="input-group">

                <label>📅 Target Date</label>

                <input
                    type="date"
                    id="targetDate">

            </div>

            <!-- Time -->

            <div class="input-group">

                <label>🕒 Target Time</label>

                <input
                    type="time"
                    id="targetTime">

            </div>

            <!-- Button -->

            <button id="applyBtn">

                Apply Countdown

            </button>

            <!-- Event Title -->

            <h2 id="eventTitle">

                Event Name

            </h2>

            <!-- Countdown -->

            <div class="countdown">

                <div class="box">

                    <div
                        class="number"
                        id="days">

                        00

                    </div>

                    <span>Days</span>

                </div>

                <div class="box">

                    <div
                        class="number"
                        id="hours">

                        00

                    </div>

                    <span>Hours</span>

                </div>

                <div class="box">

                    <div
                        class="number"
                        id="minutes">

                        00

                    </div>

                    <span>Minutes</span>

                </div>

                <div class="box">

                    <div
                        class="number"
                        id="seconds">

                        00

                    </div>

                    <span>Seconds</span>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
